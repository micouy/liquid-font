<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>liquid-font</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0f;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      canvas {
        display: block;
      }
      #canvas {
        flex: 1;
      }
      #controls {
        background: rgba(0, 0, 0, 0.8);
        padding: 10px;
        color: #fff;
        font-family: monospace;
        font-size: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px 16px;
      }
      #controls label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }
      #controls input {
        width: 100px;
      }
      #controls span.val {
        display: inline-block;
        min-width: 50px;
        text-align: right;
      }
      #timeline {
        width: 100%;
        height: 80px;
        background: #111;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <label
        ><span>stickiness:</span
        ><input
          type="range"
          id="stickiness"
          min="0"
          max="60"
          step="1"
          value="6"
        /><span class="val" id="stickinessVal">6</span></label
      >
      <label
        ><span>stiffness:</span
        ><input
          type="range"
          id="stiffness"
          min="0"
          max="20"
          step="1"
          value="15"
        /><span class="val" id="stiffnessVal">15</span></label
      >
      <label
        ><span>surfTen:</span
        ><input
          type="range"
          id="surfaceTension"
          min="0"
          max="200"
          step="1"
          value="13"
        /><span class="val" id="surfaceTensionVal">13</span></label
      >
      <label
        ><span>adhesive:</span
        ><input
          type="range"
          id="adhesive"
          min="0"
          max="240"
          step="1"
          value="12"
        /><span class="val" id="adhesiveVal">12</span></label
      >
      <label
        ><span>range:</span
        ><input
          type="range"
          id="interactionRange"
          min="2"
          max="10"
          step="0.5"
          value="2.5"
        /><span class="val" id="interactionRangeVal">2.5</span></label
      >
      <label
        ><span>maxForce:</span
        ><input
          type="range"
          id="maxForce"
          min="0"
          max="0.2"
          step="0.001"
          value="0.05"
        /><span class="val" id="maxForceVal">0.050</span></label
      >
      <label
        ><span>overlapCap:</span
        ><input
          type="range"
          id="overlapForceMax"
          min="0"
          max="2"
          step="0.01"
          value="1"
        /><span class="val" id="overlapForceMaxVal">1.00</span></label
      >
      <label
        ><span>frictionAir:</span
        ><input
          type="range"
          id="frictionAir"
          min="0"
          max="0.01"
          step="0.001"
          value="0.004"
        /><span class="val" id="frictionAirVal">0.004</span></label
      >
      <label
        ><span>gravity:</span
        ><input
          type="range"
          id="gravity"
          min="0"
          max="0.2"
          step="0.005"
          value="0.14"
        /><span class="val" id="gravityVal">0.140</span></label
      >
    </div>
    <canvas id="timeline"></canvas>
    <canvas id="canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
