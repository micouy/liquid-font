<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>liquid-font</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0a0f;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            canvas {
                flex: 1;
            }
            #controls {
                background: rgba(0, 0, 0, 0.8);
                padding: 10px;
                color: #fff;
                font-family: monospace;
                font-size: 12px;
            }
            #controls label {
                display: inline-block;
                margin-right: 20px;
            }
            #controls label {
                display: inline-block;
                margin-right: 20px;
            }
            #controls input {
                width: 150px;
            }
            #controls span {
                display: inline-block;
                width: 80px;
            }
            canvas {
                display: block;
            }
        </style>
    </head>
    <body>
        <div id="controls">
            <label
                ><span>Cohesion:</span
                ><input
                    type="range"
                    id="cohesionCoeff"
                    min="0"
                    max="0.05"
                    step="0.0005"
                    value="0.01"
                /><span id="cohesionCoeffVal">0.01</span></label
            >
            <label
                ><span>Repulsion:</span
                ><input
                    type="range"
                    id="repulsionCoeff"
                    min="0"
                    max="0.05"
                    step="0.0005"
                    value="0.005"
                /><span id="repulsionCoeffVal">0.005</span></label
            >
        </div>
        <canvas id="canvas"></canvas>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
