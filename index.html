<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>liquid-font</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0f;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      canvas {
        display: block;
      }
      #canvas {
        flex: 1;
      }
      #controls {
        background: rgba(0, 0, 0, 0.8);
        padding: 10px;
        color: #fff;
        font-family: monospace;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #controls label {
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }
      #controls label span:first-child {
        width: 150px;
      }
      #controls input {
        width: 180px;
        flex: 0 0 auto;
      }
      #controls span.val {
        display: inline-block;
        min-width: 50px;
        text-align: right;
      }
      #timeline {
        width: 100%;
        height: 80px;
        background: #111;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <label
        ><span>liquid attract:</span
        ><input
          type="range"
          id="stickiness"
          min="0"
          max="60"
          step="1"
          value="0"
        /><span class="val" id="stickinessVal">0</span></label
      >
      <label
        ><span>liquid repel:</span
        ><input
          type="range"
          id="stiffness"
          min="0"
          max="120"
          step="1"
          value="20"
        /><span class="val" id="stiffnessVal">20</span></label
      >
      <label
        ><span>surface tension strength:</span
        ><input
          type="range"
          id="surfaceTension"
          min="0"
          max="200"
          step="1"
          value="20"
        /><span class="val" id="surfaceTensionVal">20</span></label
      >
      <label
        ><span>liquid normal weight:</span
        ><input
          type="range"
          id="liquidNormalWeight"
          min="0"
          max="4"
          step="0.1"
          value="1.0"
        /><span class="val" id="liquidNormalWeightVal">1.0</span></label
      >
      <label
        ><span>glyph normal weight:</span
        ><input
          type="range"
          id="glyphNormalWeight"
          min="0"
          max="4"
          step="0.1"
          value="2.0"
        /><span class="val" id="glyphNormalWeightVal">2.0</span></label
      >
      <label
        ><span>glyph adhesion:</span
        ><input
          type="range"
          id="adhesive"
          min="0"
          max="480"
          step="1"
          value="12"
        /><span class="val" id="adhesiveVal">12</span></label
      >
      <label
        ><span>glyph repulsion:</span
        ><input
          type="range"
          id="glyphRepulsion"
          min="0"
          max="8"
          step="0.1"
          value="2.0"
        /><span class="val" id="glyphRepulsionVal">2.0</span></label
      >
      <label
        ><span>gravity:</span
        ><input
          type="range"
          id="gravity"
          min="0"
          max="0.2"
          step="0.005"
          value="0.2"
        /><span class="val" id="gravityVal">0.200</span></label
      >
      <label
        ><span>cursor force:</span
        ><input
          type="range"
          id="cursorForce"
          min="0"
          max="4"
          step="0.05"
          value="0.75"
        /><span class="val" id="cursorForceVal">0.75</span></label
      >
      <label
        ><span>interaction range:</span
        ><input
          type="range"
          id="interactionRange"
          min="2"
          max="10"
          step="0.5"
          value="2.5"
        /><span class="val" id="interactionRangeVal">2.5</span></label
      >
      <label
        ><span>attract cap:</span
        ><input
          type="range"
          id="maxForce"
          min="0"
          max="0.2"
          step="0.001"
          value="0.05"
        /><span class="val" id="maxForceVal">0.050</span></label
      >
      <label
        ><span>repel cap:</span
        ><input
          type="range"
          id="overlapForceMax"
          min="0"
          max="2"
          step="0.01"
          value="1"
        /><span class="val" id="overlapForceMaxVal">1.00</span></label
      >
      <label
        ><span>frictionAir:</span
        ><input
          type="range"
          id="frictionAir"
          min="0"
          max="0.01"
          step="0.001"
          value="0.005"
        /><span class="val" id="frictionAirVal">0.005</span></label
      >
    </div>
    <canvas id="timeline"></canvas>
    <canvas id="canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
